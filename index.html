<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Granero Fino en Placilla, Valparaíso. Frutos secos, harinas, semillas, café, snacks y productos seleccionados para comer rico, simple y mejor todos los días." />
  <meta property="og:title" content="Granero Fino | Placilla Valparaíso" />
  <meta property="og:description" content="Frutos secos, harinas, semillas, café y productos gourmet en Placilla." />
  <meta property="og:image" content="https://i.postimg.cc/T1whcZTp/Save-Clip-App-669941677-18077817488217158-5737821120732426179-n.jpg" />
  <meta property="og:type" content="website" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #F7F1E6;
      color: #2B2118;
      font-family: Arial, Helvetica, sans-serif;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.7s ease-out both;
    }

    .font-serif {
      font-family: Georgia, 'Times New Roman', serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const Icon = ({ label, children, className = '' }) => (
      <span
        aria-label={label}
        role="img"
        className={`inline-flex items-center justify-center leading-none ${className}`}
      >
        {children}
      </span>
    );

    const validateLandingData = ({ products, reasons, whatsappUrl, mapsUrl, instagramUrl, galleryImages }) => {
      const errors = [];

      if (!Array.isArray(products) || products.length < 3) {
        errors.push('Debe haber al menos 3 categorías de productos.');
      }

      if (!Array.isArray(reasons) || reasons.length < 4) {
        errors.push('Debe haber al menos 4 razones para comprar.');
      }

      if (!Array.isArray(galleryImages) || galleryImages.length < 6) {
        errors.push('Debe haber al menos 6 imágenes en la galería.');
      }

      if (!whatsappUrl.startsWith('https://api.whatsapp.com/send?phone=')) {
        errors.push('El link de WhatsApp debe usar https://api.whatsapp.com/send?phone=.');
      }

      if (!mapsUrl.startsWith('https://')) {
        errors.push('El link de mapa debe ser una URL segura.');
      }

      if (!instagramUrl.includes('instagram.com/granerofino')) {
        errors.push('El link de Instagram debe apuntar a @granerofino.');
      }

      return errors;
    };

    function GraneroFinoLanding() {
      const whatsappUrl = 'https://api.whatsapp.com/send?phone=56934263907&text=Hola%20Granero%20Fino%2C%20quiero%20consultar%20por%20productos%20y%20promociones';
      const mapsUrl = 'https://maps.app.goo.gl/x6K7QYUmsjUBGMF7A';
      const instagramUrl = 'https://www.instagram.com/granerofino/';
      const heroImageUrl = 'https://i.postimg.cc/T1whcZTp/Save-Clip-App-669941677-18077817488217158-5737821120732426179-n.jpg';
      const reelEmbedUrl = 'https://www.instagram.com/reel/DX21AxUsgTf/embed/captioned/';

      const galleryImages = [
        {
          image: 'https://i.postimg.cc/NG35XCWm/Save-Clip-App-670796351-18079125239217158-5454141618041767618-n.jpg',
          title: 'Mixes y snacks para cualquier momento',
          subtitle: 'Opciones prácticas para la oficina, el deporte o la casa.',
        },
        {
          image: 'https://i.postimg.cc/8Cc19L2C/Save-Clip-App-695187102-18083075141217158-812044588857216489-n.jpg',
          title: 'Productos frescos y seleccionados',
          subtitle: 'Calidad visible desde que entras al local.',
        },
        {
          image: 'https://i.postimg.cc/3NF5dwsb/Save-Clip-App-670266815-1019944353698690-5859678279601353992-n.jpg',
          title: 'Una despensa más natural',
          subtitle: 'Semillas, harinas y productos para comer mejor todos los días.',
        },
        {
          image: 'https://i.postimg.cc/3R2zcRJf/Save-Clip-App-671812509-18079536395217158-6467842540565283942-n.jpg',
          title: 'Detalles que hacen la diferencia',
          subtitle: 'Presentación cuidada y atención cercana en cada compra.',
        },
        {
          image: 'https://i.postimg.cc/vHYC0GRS/Save-Clip-App-673880674-18079536377217158-3955184446424175125-n.jpg',
          title: 'Gran variedad para descubrir',
          subtitle: 'Frutos secos, snacks y productos gourmet en un solo lugar.',
        },
        {
          image: 'https://i.postimg.cc/zvXpFXLk/Save-Clip-App-684029145-18081265262217158-6403525620872705106-n.jpg',
          title: 'Sabores que invitan a volver',
          subtitle: 'Productos que combinan calidad, presentación y cercanía.',
        },
      ];

      const products = [
        {
          icon: <Icon label="Hoja" className="text-3xl">🌿</Icon>,
          title: 'Frutos secos',
          text: 'Maní, nueces, almendras, pasas, mix energéticos y opciones para todos los días.',
        },
        {
          icon: <Icon label="Trigo" className="text-3xl">🌾</Icon>,
          title: 'Harinas y semillas',
          text: 'Harinas seleccionadas, linaza, zapallo, avena y productos para cocinar mejor.',
        },
        {
          icon: <Icon label="Café" className="text-3xl">☕</Icon>,

          text: 'Cafés, endulzantes, cacao, snacks y productos especiales para tu despensa.',
        },

        'Atención cercana y familiar',
        'Productos seleccionados para la mesa diaria',
        'Opciones a granel y formatos prácticos',
        'Promociones y novedades por WhatsApp e Instagram',
      ];

      const diagnostics = validateLandingData({ products, reasons, whatsappUrl, mapsUrl, instagramUrl, galleryImages });

      console.assert(products.length === 3, 'Test: deben existir 3 categorías de productos.');
      console.assert(reasons.length >= 4, 'Test: deben existir al menos 4 razones de compra.');
      console.assert(galleryImages.length >= 6, 'Test: deben existir al menos 6 imágenes de galería.');
      console.assert(whatsappUrl.includes('56934263907'), 'Test: WhatsApp debe usar el número real de Granero Fino.');
      console.assert(mapsUrl.includes('x6K7QYUmsjUBGMF7A'), 'Test: Maps debe usar el link real indicado.');

      if (diagnostics.length > 0) {
        console.warn('Granero Fino Landing - revisar configuración:', diagnostics);
      }

            <div className="relative max-w-7xl mx-auto px-5 py-6 md:py-8">

                  <div>

                  </div>
                </div>
                <a href={instagramUrl} target="_blank" rel="noopener noreferrer" className="hidden sm:inline-flex items-center gap-2 px-4 py-2 rounded-full border border-[#2B2118]/20 bg-white/40 hover:bg-white/70 transition">
                  <Icon label="Instagram">◎</Icon> @granerofino

              <div className="grid lg:grid-cols-2 gap-10 items-center pt-14 pb-16 md:pt-20 md:pb-24">
                <div className="fade-in">
                  <div className="inline-flex items-center gap-2 rounded-full bg-white/55 border border-white/60 px-4 py-2 text-sm text-[#6F5437] mb-6">
                    <Icon label="Bolsa">🛍️</Icon> Productos a granel, seleccionados y gourmet
                  </div>
                  <h1 className="font-serif text-5xl md:text-7xl leading-[0.95] tracking-tight max-w-2xl">
                    Comer bien es volver a lo esencial.
                  </h1>
                  <p className="mt-6 text-lg md:text-xl text-[#5A4631] max-w-xl leading-relaxed">
                    En Granero Fino encuentras frutos secos, harinas, semillas, café y productos seleccionados para comer rico, simple y mejor todos los días.
                  </p>
                  <div className="mt-8 flex flex-col sm:flex-row gap-3">

                      <Icon label="WhatsApp">💬</Icon> Consultar por WhatsApp

                    <a href={mapsUrl} target="_blank" rel="noopener noreferrer" className="inline-flex items-center justify-center gap-2 rounded-2xl bg-white/70 text-[#2B2118] px-6 py-4 font-medium border border-[#2B2118]/10 hover:bg-white transition">
                      <Icon label="Mapa">📍</Icon> Cómo llegar
                    </a>
                  </div>
                  <p className="mt-4 text-sm text-[#6F5437]">Av. Obispo Valdés Subercaseaux 543, Local 7</p>
                </div>

                <div className="relative fade-in">
                  <div className="rounded-[2rem] bg-[#2B2118] text-white p-3 md:p-4 shadow-2xl rotate-1">
                    <div className="relative overflow-hidden rounded-[1.5rem] -rotate-1 min-h-[520px] bg-[#EFE0CA]">
                      <img src={heroImageUrl} alt="Productos seleccionados de Granero Fino" className="absolute inset-0 h-full w-full object-cover" />
                      <div className="absolute inset-0 bg-gradient-to-t from-[#2B2118]/85 via-[#2B2118]/25 to-transparent" />
                      <div className="absolute bottom-0 left-0 right-0 p-6 md:p-8 text-white">
                        <p className="text-sm uppercase tracking-[0.3em] text-[#E7C98D]">Hoy en tu barrio</p>
                        <h2 className="font-serif text-4xl md:text-5xl mt-3">Despensa rica, natural y cercana.</h2>
                        <div className="mt-6 grid grid-cols-2 gap-3 text-sm">
                          <div className="rounded-2xl bg-white/15 backdrop-blur px-4 py-3 border border-white/15"><Icon label="Estrella" className="mr-2">★</Icon> Selección fina</div>
                          <div className="rounded-2xl bg-white/15 backdrop-blur px-4 py-3 border border-white/15"><Icon label="Corazón" className="mr-2">♡</Icon> Proyecto familiar</div>
                          <div className="rounded-2xl bg-white/15 backdrop-blur px-4 py-3 border border-white/15"><Icon label="Hoja" className="mr-2">🌿</Icon> A granel</div>
                          <div className="rounded-2xl bg-white/15 backdrop-blur px-4 py-3 border border-white/15"><Icon label="Reloj" className="mr-2">⏱</Icon> Novedades diarias</div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <section className="max-w-7xl mx-auto px-5 py-16">
            <div className="text-center max-w-3xl mx-auto">
              <p className="text-sm uppercase tracking-[0.25em] text-[#8A6B43]">Qué vas a encontrar</p>
              <h2 className="font-serif text-4xl md:text-5xl mt-3">Productos para comer mejor sin complicarte</h2>
            </div>
            <div className="grid md:grid-cols-3 gap-5 mt-10">
              {products.map((item) => (
                <div key={item.title} className="rounded-[1.5rem] bg-white/75 p-7 shadow-sm border border-[#2B2118]/5">
                  <div className="w-14 h-14 rounded-2xl bg-[#EFE0CA] flex items-center justify-center text-[#6F5437] mb-5">{item.icon}</div>
                  <h3 className="font-serif text-2xl">{item.title}</h3>
                  <p className="mt-3 text-[#5A4631] leading-relaxed">{item.text}</p>
                </div>
              ))}
            </div>
          </section>

          <section className="bg-[#2B2118] text-white py-16">
            <div className="max-w-7xl mx-auto px-5 grid lg:grid-cols-2 gap-10 items-center">
              <div>
                <p className="text-sm uppercase tracking-[0.25em] text-[#C9A46A]">Por qué elegirnos</p>
                <h2 className="font-serif text-4xl md:text-5xl mt-3">Un local pensado para comprar simple, rico y con confianza.</h2>
                <p className="mt-5 text-white/75 leading-relaxed text-lg">
                  Queremos que cada visita sea fácil: que encuentres productos para tu desayuno, colación, cocina, once o snack saludable, con una atención cercana y recomendaciones concretas.
                </p>
              </div>
              <div className="grid gap-3">
                {reasons.map((reason) => (
                  <div key={reason} className="rounded-2xl bg-white/10 border border-white/10 px-5 py-4 flex items-center gap-3">
                    <div className="w-2 h-2 rounded-full bg-[#C9A46A]" />
                    <span>{reason}</span>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section className="max-w-7xl mx-auto px-5 py-16">
            <div className="text-center max-w-3xl mx-auto mb-10">
              <p className="text-sm uppercase tracking-[0.25em] text-[#8A6B43]">Nuestro local</p>
              <h2 className="font-serif text-4xl md:text-5xl mt-3">Una experiencia cálida y cercana</h2>
              <p className="mt-4 text-[#5A4631] leading-relaxed">
                Queremos que entrar a Granero Fino se sienta distinto: aromas, productos frescos y una atención simple y humana.
              </p>
            </div>

            <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-6 mb-14">
              {galleryImages.map((item, index) => (
                <div key={item.image} className="group relative overflow-hidden rounded-[2rem] shadow-xl min-h-[420px] bg-[#EFE0CA]">
                  <img src={item.image} alt={`Granero Fino galería ${index + 1}`} className="absolute inset-0 h-full w-full object-cover transition duration-700 group-hover:scale-105" />
                  <div className="absolute inset-0 bg-gradient-to-t from-[#2B2118]/70 via-[#2B2118]/10 to-transparent" />
                  <div className="absolute bottom-0 left-0 right-0 p-6 text-white">
                    <p className="text-sm uppercase tracking-[0.25em] text-[#E7C98D]">Granero Fino</p>
                    <h3 className="font-serif text-3xl mt-2">{item.title}</h3>
                    <p className="mt-2 text-white/85 leading-relaxed">{item.subtitle}</p>
                  </div>
                </div>
              ))}
            </div>

            <div className="rounded-[2rem] bg-[#EFE0CA] p-7 md:p-10 grid lg:grid-cols-2 gap-8 items-center">
              <div>
                <p className="text-sm uppercase tracking-[0.25em] text-[#8A6B43]">Promos y novedades</p>
                <h2 className="font-serif text-4xl mt-3">Síguenos y recibe las ofertas del día</h2>
                <p className="mt-4 text-[#5A4631] leading-relaxed">
                  Publicamos novedades, productos destacados, combos y promociones para que aproveches mejor tu compra semanal.
                </p>
              </div>
              <div className="flex flex-col sm:flex-row gap-3 lg:justify-end">
                <a href={whatsappUrl} target="_blank" rel="noopener noreferrer" className="inline-flex items-center justify-center gap-2 rounded-2xl bg-[#2B2118] text-white px-6 py-4 font-medium shadow-lg">

</html>
